<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPI QR Display for Shop - Aligned Amount Field</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4ff; padding: 20px; margin: 0; color: #333; }
    .container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 420px; gap: 30px; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .qr-side { order: -1; } }
    h1 { color: #004c99; text-align: center; margin-bottom: 20px; }
    .form-section, .qr-side {
      background: white; border-radius: 16px; padding: 28px; box-shadow: 0 6px 24px rgba(0,0,0,0.1); border: 1px solid #d0d9e4;
    }
    .field { margin-bottom: 24px; }
    label { font-weight: 600; display: block; margin-bottom: 8px; color: #444; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #c3d1e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    input:focus { border-color: #0066cc; outline: none; box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
    
    /* Fix for amount field */
    .amount-row { position: relative; }
    .rupee { 
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%); 
      color: #555; font-weight: bold; font-size: 18px; pointer-events: none; z-index: 1;
    }
    .amount-row input { 
      padding-left: 42px; /* More space for rupee */
      padding-right: 30px; /* Space for spinner if visible */
      height: 48px; /* Consistent height */
      line-height: 24px; /* Better vertical centering */
    }
    /* Hide spinner arrows on number input for clean look (optional, remove if you want them) */
    .amount-row input[type="number"]::-webkit-inner-spin-button,
    .amount-row input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .amount-row input[type="number"] { -moz-appearance: textfield; } /* Firefox */

    .btn { background: #0066cc; color: white; border: none; padding: 14px; font-size: 17px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 12px; }
    .btn:hover { background: #004c99; }
    .qr-side { text-align: center; padding: 32px 24px; }
    #displayName { font-size: 2.1rem; font-weight: 800; color: #0066cc; margin: 0 0 24px; text-transform: uppercase; letter-spacing: 1px; min-height: 40px; }
    #qrcode { width: 260px; height: 260px; margin: 0 auto 24px; background: #f8f8f8; border: 8px solid #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #displayUpi { font-family: monospace; font-size: 1.4rem; color: #0066cc; font-weight: 700; margin: 16px 0 12px; }
    .hint { color: #444; font-size: 1.05rem; margin: 8px 0 28px; line-height: 1.4; }
    .logos { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 24px 32px; max-width: 100%; }
    .logos img { height: 48px; width: auto; object-fit: contain; flex: 0 0 auto; }
    footer { text-align: center; margin-top: 40px; color: #777; font-size: 0.95rem; }
  </style>
</head>
<body>

<h1>Your Shop UPI Payment Display</h1>

<div class="container">

  <div class="form-section">
    <div class="field">
      <label>Merchant / Shop Name</label>
      <input type="text" id="merchantName" placeholder="e.g. Tea Shop" value="tea" />
    </div>
    <div class="field">
      <label>UPI ID</label>
      <input type="text" id="upiId" placeholder="e.g. nithin@ybl" value="nithin@ybl" />
    </div>
    <div class="field">
      <label>Amount (optional - leave blank for any amount)</label>
      <div class="amount-row">
        <span class="rupee">₹</span>
        <input type="number" id="amount" placeholder="e.g. 100" step="0.01" min="0" />
      </div>
    </div>
    <div class="field">
      <label>Notes (optional - shows in app)</label>
      <input type="text" id="note" placeholder="e.g. Thanks for your purchase!" value="Thanks for your purchase!" />
    </div>
    <button class="btn" id="downloadBtn">↓ Download Full Display (with text & logos)</button>
  </div>

  <div class="qr-side" id="captureArea">
    <div id="displayName">TEA</div>
    <div id="qrcode">Generating...</div>
    <div id="displayUpi">nithin@ybl</div>
    <div class="hint">Scan and pay with any BHIM UPI app</div>
    <div class="logos">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Google_Pay_Logo.svg" alt="Google Pay" crossorigin="anonymous">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" alt="PhonePe" crossorigin="anonymous">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Paytm_Logo_%28standalone%29.svg" alt="Paytm" crossorigin="anonymous">
      <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Amazon_Pay_logo.svg" alt="Amazon Pay" crossorigin="anonymous">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/65/BHIM_logo.svg" alt="BHIM" crossorigin="anonymous">
    </div>
  </div>

</div>

<footer>BHIM • UPI • Unified Payments Interface</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const els = {
    merchant: document.getElementById('merchantName'),
    upi: document.getElementById('upiId'),
    amount: document.getElementById('amount'),
    note: document.getElementById('note'),
    downloadBtn: document.getElementById('downloadBtn'),
    nameDisplay: document.getElementById('displayName'),
    upiDisplay: document.getElementById('displayUpi'),
    qrDiv: document.getElementById('qrcode'),
    capture: document.getElementById('captureArea')
  };

  let qr = null;

  function update() {
    const name = els.merchant.value.trim();
    const upi = els.upi.value.trim();
    els.nameDisplay.textContent = name.toUpperCase() || 'MERCHANT NAME';
    els.upiDisplay.textContent = upi || 'yourid@upi';

    if (!upi) {
      els.qrDiv.innerHTML = 'Enter UPI ID to generate';
      return;
    }

    let uri = `upi://pay?pa=${encodeURIComponent(upi)}`;
    if (name) uri += `&pn=${encodeURIComponent(name)}`;
    if (els.amount.value.trim()) uri += `&am=${els.amount.value}&mam=${els.amount.value}`;
    if (els.note.value.trim()) uri += `&tn=${encodeURIComponent(els.note.value.trim())}`;
    uri += `&cu=INR`;

    els.qrDiv.innerHTML = '';
    qr = new QRCode(els.qrDiv, {
      text: uri,
      width: 240,
      height: 240,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  function download() {
    if (!els.upi.value.trim()) return alert('Enter UPI ID first!');
    
    html2canvas(els.capture, {
      scale: 4,
      useCORS: true,
      allowTaint: false,
      logging: false,
      backgroundColor: '#ffffff',
      windowWidth: els.capture.scrollWidth,
      windowHeight: els.capture.scrollHeight
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = `${els.merchant.value.trim().toLowerCase() || 'shop'}-upi-display.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }).catch(err => alert('Capture failed: ' + err.message));
  }

  els.merchant.addEventListener('input', update);
  els.upi.addEventListener('input', update);
  els.amount.addEventListener('input', update);
  els.note.addEventListener('input', update);
  els.downloadBtn.addEventListener('click', download);

  update();  // Initial
</script>
</body>
</html>
